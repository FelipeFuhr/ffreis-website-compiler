name: Docker Build

on:
  pull_request:
    paths:
      - '**'
      - '.github/workflows/**'
  push:
    branches: [main, master]
    paths:
      - '**'
      - '.github/workflows/**'

jobs:
  docker:
    uses: FelipeFuhr/ffreis-workflows-container/.github/workflows/container-build.yml@d98c6bb3df3e09b3c47b19b9778a7650a406c96b
    with:
      image: "website-compiler-cli"
      containerfile: "containers/Dockerfile.cli"
      context: "."
      skip-if-missing: true
      push: false
      build-args: |-
        BUILDER_IMAGE=${{ vars.WEBSITE_COMPILER_BUILDER_IMAGE || 'golang:1.25.8-bookworm' }}
        RUNTIME_IMAGE=${{ vars.WEBSITE_COMPILER_RUNTIME_IMAGE || 'debian:bookworm-slim' }}
