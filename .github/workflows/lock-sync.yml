name: Lock Sync

on:
  pull_request:
    paths:
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/**'
  push:
    branches: [main, master]
    paths:
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/**'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Verify module state
        run: |
          go mod tidy
          go mod verify
          git diff --exit-code go.mod go.sum
