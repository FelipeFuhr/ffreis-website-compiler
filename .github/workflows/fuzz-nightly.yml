name: Nightly Fuzz

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  fuzz:
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-fuzz.yml@main
    with:
      go-version: "1.25.8"
      working-directory: "."
      packages: "./internal/sitemap ./internal/sitegen"
      fuzz-targets: "Fuzz"
      fuzz-time: "20s"
