name: Nightly Fuzz

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'
          cache: true
      - name: Fuzz sitemap parser
        run: go test ./internal/sitemap -run=^$ -fuzz=FuzzLoadConfigAndGenerateXML -fuzztime=20s
      - name: Fuzz sitegen helpers
        run: go test ./internal/sitegen -run=^$ -fuzz=Fuzz -fuzztime=20s
