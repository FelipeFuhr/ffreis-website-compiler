name: gRPC Sync

on:
  pull_request:
    paths:
      - '**'
      - '.github/workflows/**'

jobs:
  grpc-sync:
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-run-commands.yml@ed2f7d29467bf1fd6ec40df3953b3ee128ba3f04
    with:
      working-directory: "."
      skip-if-glob-empty: |-
        **/*.proto
        **/*_pb.go
        **/*.pb.go
      commands: |-
        set -euo pipefail
        echo "Proto/gRPC files detected. Add a generation check script to enforce sync."
