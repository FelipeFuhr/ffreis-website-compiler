name: API Gateway Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: '15 4 * * *'

jobs:
  smoke:
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-http-smoke.yml@510fa18cb916d2fe30251e4fae2726335028d5fa
    with:
      paths: |-
        /
        /index.html
    secrets:
      SMOKE_BASE_URL: ${{ secrets.SMOKE_BASE_URL }}
