name: API Gateway Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: '15 4 * * *'

jobs:
  require-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets
        shell: bash
        env:
          SMOKE_BASE_URL: ${{ secrets.SMOKE_BASE_URL }}
        run: |
          set -euo pipefail
          [ -n "${SMOKE_BASE_URL}" ] || (echo "Missing required secret: SMOKE_BASE_URL" >&2; exit 1)

  smoke:
    runs-on: ubuntu-latest
    if: ${{ secrets.SMOKE_BASE_URL != '' }}
    steps:
      - name: Smoke checks
        env:
          BASE: ${{ secrets.SMOKE_BASE_URL }}
        run: |
          set -euo pipefail
          curl -fsS "$BASE/" >/dev/null
          curl -fsS "$BASE/index.html" >/dev/null
