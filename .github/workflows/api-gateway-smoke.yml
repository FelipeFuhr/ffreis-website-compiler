name: API Gateway Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: '15 4 * * *'

jobs:
  smoke:
    runs-on: ubuntu-latest
    if: ${{ secrets.SMOKE_BASE_URL != '' }}
    steps:
      - name: Smoke checks
        env:
          BASE: ${{ secrets.SMOKE_BASE_URL }}
        run: |
          set -euo pipefail
          curl -fsS "$BASE/" >/dev/null
          curl -fsS "$BASE/index.html" >/dev/null
