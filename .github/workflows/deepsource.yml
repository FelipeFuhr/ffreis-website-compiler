name: DeepSource

on:
  pull_request:
    paths:
      - '**'
      - '.github/workflows/**'
  push:
    branches: [main, master]
    paths:
      - '**'
      - '.github/workflows/**'

jobs:
  require-secrets:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
    steps:
      - name: Validate required secrets
        shell: bash
        env:
          DEEPSOURCE_DSN: ${{ secrets.DEEPSOURCE_DSN }}
        run: |
          set -euo pipefail
          [ -n "${DEEPSOURCE_DSN}" ] || (echo "Missing required secret: DEEPSOURCE_DSN" >&2; exit 1)
  deepsource:
    needs: [require-secrets]
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-deepsource-coverage.yml@ed2f7d29467bf1fd6ec40df3953b3ee128ba3f04
    with:
      go-version: "1.25.8"
      working-directory: "."
    secrets:
      DEEPSOURCE_DSN: ${{ secrets.DEEPSOURCE_DSN }}
