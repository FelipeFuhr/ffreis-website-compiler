name: Commit Checks

on:
  pull_request:
    paths:
      - '**'
      - '.github/workflows/**'
  push:
    branches: [main, master]
    paths:
      - '**'
      - '.github/workflows/**'

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: go mod tidy is clean
        run: |
          go mod tidy
          go mod verify
          files=(go.mod)
          if [ -f go.sum ]; then
            files+=(go.sum)
          fi
          git diff --exit-code -- "${files[@]}" || (echo 'go.mod/go.sum not tidy' && exit 1)
      - name: Format Check
        run: |
          test -z "$(gofmt -l .)"
