name: Code Quality (SonarQube)

on:
  pull_request:
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'sonar-project.properties'
      - '.github/workflows/code-quality.yml'
  push:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sonar:
    name: SonarQube
    runs-on: ubuntu-latest
    # Set repository variable SONAR_ENABLED=false to skip this job entirely.
    # Default: runs. If SONAR_TOKEN or SONAR_HOST_URL are missing, fails
    # explicitly with instructions — never silently passes.
    if: vars.SONAR_ENABLED != 'false' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for accurate blame and new-code detection

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # ── Explicit credential check ──────────────────────────────────────────
      # Fails with a clear message if secrets are absent.
      # To disable this job entirely: Settings → Variables → SONAR_ENABLED=false
      - name: Verify SonarQube credentials
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          missing=""
          if [ -z "${SONAR_TOKEN}" ]; then
            missing="${missing}  • SONAR_TOKEN (secret): your SonarQube authentication token\n"
          fi
          if [ -z "${SONAR_HOST_URL}" ]; then
            missing="${missing}  • SONAR_HOST_URL (secret): your SonarQube server URL\n"
          fi
          if [ -n "${missing}" ]; then
            echo "::error title=SonarQube not configured::Missing configuration:"
            printf "%b" "${missing}"
            echo ""
            echo "Add in: Settings → Secrets and variables → Actions → New repository secret"
            echo "To skip this job entirely: Settings → Variables → add SONAR_ENABLED=false"
            exit 1
          fi

      # ── Coverage ────────────────────────────────────────────────────────────
      - name: Generate coverage for SonarQube
        run: go test ./... -coverprofile=coverage.out -covermode=atomic -count=1

      # ── Scan ────────────────────────────────────────────────────────────────
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          projectBaseDir: .
          args: >
            -Dsonar.projectKey=ffreis-website-compiler
            -Dsonar.go.coverage.reportPaths=coverage.out
            -Dsonar.sources=.
            -Dsonar.exclusions=vendor/**,**/*_test.go
            -Dsonar.tests=.
            -Dsonar.test.inclusions=**/*_test.go
