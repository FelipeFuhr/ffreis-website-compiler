name: Code Quality (Sonar)

on:
  pull_request:
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'sonar-project.properties'
      - '.github/workflows/code-quality.yml'
  push:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sonar:
    # Skip running on forked PRs (secrets are not available).
    #
    # NOTE: The shared workflow expects SonarCloud configuration. If it's not
    # configured, skip rather than fail the entire CI run.
    if: vars.SONAR_ENABLED != 'false' && secrets.SONAR_TOKEN != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-sonarqube.yml@ed2f7d29467bf1fd6ec40df3953b3ee128ba3f04
    with:
      go-version: "1.25.8"
      working-directory: "."
      sonar-project-key: "ffreis-website-compiler"
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
