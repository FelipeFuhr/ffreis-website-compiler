name: Code Quality (SonarQube)

on:
  pull_request:
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'sonar-project.properties'
      - '.github/workflows/code-quality.yml'
  push:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sonar:
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-sonarqube.yml@main
    with:
      go-version: "1.25.8"
      working-directory: "."
      sonar-project-key: "ffreis-website-compiler"
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
